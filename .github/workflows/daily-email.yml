name: Daily Email Briefing

on:
  schedule:
    # UTC 00:01 = 北京时间 08:01 (UTC+8)
    - cron: '1 0 * * *'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 生成简报内容（后续替换成你的资讯抓取逻辑，先测试用固定文本）
      - name: Generate brief content
        run: |
          echo "今日全球简报测试内容" > brief.txt

      # 内置发邮件动作
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: 每日早间简报
          to: 24021905@qq.com
          from: ${{ secrets.EMAIL_USER }}
          body: file://brief.txt

      # 底部汇总信息（保留原展示逻辑）
      - name: Summary
        if: always()
        run: |
          echo "### Daily Briefing Result" >> $GITHUB_STEP_SUMMARY
          echo "Triggered at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Target time: 08:01 Beijing Time" >> $GITHUB_STEP_SUMMARY
